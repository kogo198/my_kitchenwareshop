services:
  - type: web
    name: kitchencraft-shop
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn my_kitchenwareshop.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kitchencraft-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: kitchencraft-db
    plan: free
    databaseName: kitchencraft
